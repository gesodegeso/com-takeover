# ============================================
# /etc/tempo/tempo.yaml
# Tempo 設定（ネイティブインストール用）
# ============================================

server:
  http_listen_port: 3200

stream_over_http_enabled: true

# OTLP 受信設定
distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

# トレース → メトリクス自動生成
metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/lib/tempo/generator/wal
    remote_write:
      # ★ localhost の Prometheus へ送信
      - url: http://localhost:9090/api/v1/write
        send_exemplars: true
  traces_storage:
    path: /var/lib/tempo/generator/traces
  processor:
    service_graphs:
      dimensions: []
      enable_client_server_prefix: true
    span_metrics:
      dimensions:
        - service.name
        - http.method
        - http.status_code

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 720h       # 30日間保持

storage:
  trace:
    backend: local
    wal:
      path: /var/lib/tempo/wal
    local:
      path: /var/lib/tempo/blocks

overrides:
  defaults:
    metrics_generator:
      processors:
        - service-graphs
        - span-metrics
