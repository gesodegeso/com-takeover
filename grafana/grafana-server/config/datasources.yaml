# ============================================
# /etc/grafana/provisioning/datasources/datasources.yaml
# Grafana データソース自動プロビジョニング
# ★ すべて localhost（同一サーバー上で稼働）
# ============================================

apiVersion: 1

datasources:
  # Prometheus - メトリクス
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://localhost:9090
    isDefault: true
    jsonData:
      httpMethod: POST
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: tempo

  # Loki - ログ
  - name: Loki
    type: loki
    access: proxy
    url: http://localhost:3100
    jsonData:
      derivedFields:
        # ログの trace_id から Tempo へジャンプ
        - datasourceUid: tempo
          matcherRegex: "trace_id=(\\w+)"
          name: TraceID
          url: "$${__value.raw}"
        - datasourceUid: tempo
          matcherRegex: "\"trace_id\":\\s*\"(\\w+)\""
          name: TraceID_JSON
          url: "$${__value.raw}"

  # Tempo - トレース
  - name: Tempo
    type: tempo
    access: proxy
    uid: tempo
    url: http://localhost:3200
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        filterByTraceID: true
        filterBySpanID: false
      tracesToMetrics:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      serviceMap:
        datasourceUid: prometheus
      search:
        hide: false
      lokiSearch:
        datasourceUid: loki
